<!DOCTYPE html>
<html>
<head>
  <title>Media Scraper Premium</title>
  <link rel="stylesheet" href="styles.css">
  <script src="lib/jszip.min.js"></script>
</head>
<body>
  <header class="main-header">
    <h1>
      <svg class="header-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="currentColor" style="width: 22px; height: 22px; vertical-align: middle; margin-right: 6px;"><path d="M224 96L192 0H128L96 96H0V448H512V96H224zM256 384c-53 0-96-43-96-96s43-96 96-96 96 43 96 96-43 96-96 96z"/></svg>
      Media Scraper <span class="premium-badge">PREMIUM</span>
    </h1>
    <button id="refreshBtn" class="refresh-btn">
      <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="currentColor" style="width: 14px; height: 14px; vertical-align: middle; margin-right: 4px;"><path d="M480 224c0-123.7-100.3-224-224-224C154.8 0 71.9 67.5 45.4 159.2c-2.3 8-10.7 12.5-18.7 10.2l-22.4-6.4c-8-2.3-12.5-10.7-10.2-18.7C24.3 54.4 129.2-16 256-16c141.4 0 256 114.6 256 256s-114.6 256-256 256C133 496 28 393.3 1.1 270.6c-1.8-8.1 3.5-16.1 11.5-17.9l22.4-5c8-1.8 16.1 3.5 17.9 11.5C76.9 366.5 158.7 448 256 448c123.7 0 224-100.3 224-224z"/></svg>
      Refresh
    </button>
  </header>
  
  <div class="container">
    <div class="stats">
      <div class="stat-card">
        <div class="stat-value" id="imageCount">0</div>
        <div class="stat-label">Images</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="videoCount">0</div>
        <div class="stat-label">Videos</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="audioCount">0</div>
        <div class="stat-label">Audio</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="otherCount">0</div>
        <div class="stat-label">Other</div>
      </div>
    </div>
    
    <div class="filters">
      <div class="filter-group">
        <label for="typeFilter">Type:</label>
        <select id="typeFilter">
          <option value="all">All</option>
          <option value="image">Images</option>
          <option value="video">Videos</option>
          <option value="audio">Audio</option>
          <option value="svg">SVG</option>
          <option value="data">Data URLs</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="filter-group">
        <label for="extensionFilter">Extension:</label>
        <select id="extensionFilter">
          <option value="all">All</option>
          <!-- Will be populated dynamically -->
        </select>
      </div>
      <div class="filter-group">
        <input type="text" id="searchFilter" placeholder="Search media...">
      </div>
    </div>
    
    <div class="progress-container">
      <div class="progress-labels">
        <span>Scraping Progress</span>
        <span id="progressPercent">0%</span>
      </div>
      <div class="progress-track">
        <div id="progressBar" class="progress-bar"></div>
      </div>
    </div>
    
    <div id="mediaContainer" class="media-container"></div>
    
    <div id="stickyDownload" class="sticky-download hidden">
      <button id="downloadSelectedBtn" class="download-selected-btn">
        <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512" fill="currentColor" style="width: 14px; height: 14px; margin-right: 6px; vertical-align: middle;"><path d="M169.4 470.6c12.5 12.5 32.8 12.5 45.3 0l160-160c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L224 370.8V64c0-17.7-14.3-32-32-32s-32 14.3-32 32v306.7L54.6 265.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3l160 160z"/></svg>
        <span id="selectedCount">0</span> Selected
      </button>
      <button id="downloadZipBtn" class="download-selected-btn" style="margin-left: 10px;">
        <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512" fill="currentColor" style="width: 14px; height: 14px; margin-right: 6px; vertical-align: middle;"><path d="M169.4 470.6c12.5 12.5 32.8 12.5 45.3 0l160-160c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L224 370.8V64c0-17.7-14.3-32-32-32s-32 14.3-32 32v306.7L54.6 265.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3l160 160z"/></svg>
        Download All
      </button>
    </div>
    
    <div id="previewModal" class="modal">
      <div class="modal-content">
        <span class="close-btn">&times;</span>
        <div id="previewContent"></div>
      </div>
    </div>
  </div>
  
  <footer class="main-footer">
    © 2025, Developed By BOOST STAR Experts
  </footer>
  
  <script src="popup.js"></script>
</body>
</html>
